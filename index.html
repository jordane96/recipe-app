    <!-- GitHub / GHE Pages: compute real directory so ./assets/* and ./recipes.json resolve -->
    <script>
      (function () {
        var p = window.location.pathname;
        var dir;
        if (p.endsWith("/")) {
          dir = p;
        } else if (/\.html$/i.test(p)) {
          dir = p.replace(/[^/]*$/i, "");
          if (!dir.endsWith("/")) dir += "/";
        } else {
          dir = p + "/";
        }
        var b = document.createElement("base");
        b.href = window.location.origin + dir;
        var m = document.querySelector("meta[charset]");
        if (m && m.parentNode) {
          m.parentNode.insertBefore(b, m.nextSibling);
        } else {
          document.head.insertBefore(b, document.head.firstChild);
        }
      })();
    </script>
